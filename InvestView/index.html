<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvestView 完整预览页</title>
  <style>
    :root { --bg:#f1f5f9; --panel:#fff; --text:#0f172a; --muted:#64748b; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:20px} .hero{background:linear-gradient(120deg,#0e7490,#0f766e);border-radius:20px;padding:20px;color:#fff;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px} .card{background:var(--panel);border-radius:14px;padding:14px;box-shadow:0 4px 20px rgba(15,23,42,.06);border-left:5px solid #d97706}
    .top{display:flex;justify-content:space-between;gap:8px}.market,.symbol,.label{font-size:12px;color:var(--muted)}.name{margin:2px 0;font-size:18px;font-weight:700}.badge{border-radius:999px;padding:3px 9px;font-size:12px;font-weight:600;white-space:nowrap}
    .price-box{margin-top:8px;background:#f8fafc;border-radius:10px;padding:8px}.price{font-size:18px;font-weight:500;color:#475569}
    .kpi-grid{margin-top:8px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.kpi{border-radius:8px;padding:8px;text-align:center}.pe{background:#ecfeff}.pb{background:#eef2ff}.peg{background:#f5f3ff}
    .kpi strong{font-size:17px}.hover{cursor:help;text-decoration:underline dotted}
    .ret-grid{margin-top:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.ret-item{background:#f8fafc;border-radius:8px;padding:6px;font-size:12px}.up{color:#059669}.down{color:#e11d48}
    .pct-grid{margin-top:10px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.pct{background:#f1f5f9;border-radius:8px;padding:6px;text-align:center;font-size:12px}.pct strong{font-size:18px}.pct.focus{background:#e0f2fe}
    .pechg-grid{margin-top:8px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.pechg{background:#ecfeff;border-radius:8px;padding:6px;text-align:center;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero"><h1>InvestView 个人投资看板（完整静态预览）</h1><p>新增 PE-FWD、PEG、PE变化，强化估值指标展示。</p></section>
    <section id="cards" class="grid"></section>
  </div>
  <script>
    const indexes=[
      {name:'标普500',market:'美股与全球',symbol:'SPX',price:5298.41,currency:'$',peTtm:24.8,peFwd:22.4,pb:4.6,peg:1.65,zone:'hold',p3:63,p5:68,p10:72,peChg:{m3:2.1,m6:4.8,y1:7.6},r:{d1:0.62,w1:1.34,m1:3.01,m3:6.98,m6:10.22,y1:18.73,y2:22.8,y5:78.16}},
      {name:'纳斯达克100',market:'美股与全球',symbol:'NDX',price:18812.12,currency:'$',peTtm:31.5,peFwd:28.7,pb:6.9,peg:1.92,zone:'sell',p3:70,p5:74,p10:79,peChg:{m3:3.4,m6:6.1,y1:9.9},r:{d1:0.45,w1:1.1,m1:4.22,m3:8.6,m6:13.4,y1:25.3,y2:33.6,y5:132.1}},
      {name:'富时100',market:'美股与全球',symbol:'FTSE',price:8344.22,currency:'£',peTtm:14.1,peFwd:13.2,pb:1.8,peg:1.38,zone:'hold',p3:38,p5:43,p10:40,peChg:{m3:0.8,m6:1.5,y1:2.4},r:{d1:0.18,w1:0.56,m1:1.42,m3:2.24,m6:4.31,y1:7.92,y2:9.5,y5:18.7}},
      {name:'沪深300',market:'A股宽基',symbol:'000300.SH',price:3588.9,currency:'¥',peTtm:11.8,peFwd:10.9,pb:1.3,peg:0.92,zone:'buy',p3:22,p5:26,p10:29,peChg:{m3:-1.6,m6:-2.3,y1:-3.8},r:{d1:-0.3,w1:-1.24,m1:-3.11,m3:-4.2,m6:-2.8,y1:-8.65,y2:-14.23,y5:-12.9}},
      {name:'中证500',market:'A股宽基',symbol:'000905.SH',price:5272.2,currency:'¥',peTtm:22.3,peFwd:20.7,pb:1.9,peg:1.21,zone:'hold',p3:35,p5:33,p10:31,peChg:{m3:-1.1,m6:-2.0,y1:-3.2},r:{d1:-0.12,w1:-0.9,m1:-2.23,m3:-5.42,m6:-4.96,y1:-10.3,y2:-20.2,y5:2.6}},
      {name:'创业板指',market:'A股宽基',symbol:'399006.SZ',price:1883.5,currency:'¥',peTtm:39.8,peFwd:34.6,pb:4.2,peg:1.57,zone:'sell',p3:74,p5:79,p10:84,peChg:{m3:2.7,m6:3.9,y1:5.5},r:{d1:0.2,w1:0.4,m1:1.6,m3:-2.1,m6:3.8,y1:-6.2,y2:-18.4,y5:10.3}},
      {name:'恒生科技指数',market:'港股市场',symbol:'HSTECH',price:3692.14,currency:'HK$',peTtm:18.5,peFwd:15.9,pb:2.1,peg:0.88,zone:'buy',p3:19,p5:24,p10:27,peChg:{m3:-0.9,m6:1.4,y1:2.8},r:{d1:-0.22,w1:0.9,m1:2.1,m3:-1.5,m6:5.8,y1:-4.1,y2:-36.2,y5:-51.3}},
      {name:'恒生指数',market:'港股市场',symbol:'HSI',price:18212.9,currency:'HK$',peTtm:9.5,peFwd:8.8,pb:1.0,peg:0.73,zone:'buy',p3:27,p5:30,p10:34,peChg:{m3:-0.5,m6:0.6,y1:1.7},r:{d1:-0.1,w1:0.4,m1:1.1,m3:-0.9,m6:3.2,y1:-2.5,y2:-12.3,y5:-18.8}},

      {name:'沪港深红利成长低波指数',market:'防御性资产',symbol:'931021.CSI',price:4211.1,currency:'¥',peTtm:11.6,peFwd:10.7,pb:1.4,peg:1.04,zone:'hold',p3:40,p5:43,p10:46,peChg:{m3:0.8,m6:1.4,y1:2.5},r:{d1:0.12,w1:0.8,m1:2.7,m3:5.2,m6:8.7,y1:15.4,y2:18.9,y5:61.1}},
      {name:'黄金ETF',market:'贵金属',symbol:'518880.SH',price:4.92,currency:'¥',peTtm:0,peFwd:0,pb:0.8,peg:0.0,zone:'hold',p3:55,p5:60,p10:64,peChg:{m3:1.1,m6:2.0,y1:3.4},r:{d1:0.43,w1:1.55,m1:4.9,m3:7.8,m6:12.5,y1:20.6,y2:28.8,y5:49.6}}
    ];
    const zoneUI={buy:{border:'#16a34a',bg:'#dcfce7',text:'#166534',label:'买入/击球区'},hold:{border:'#d97706',bg:'#fef3c7',text:'#92400e',label:'持有/观察区'},sell:{border:'#dc2626',bg:'#fee2e2',text:'#991b1b',label:'卖出/警戒区'}};
    const periods=[['1天','d1'],['1周','w1'],['1月','m1'],['3月','m3'],['6月','m6'],['1年','y1'],['2年','y2'],['5年','y5']];
    const fmt=v=>v===0?'N/A':v.toFixed(2);
    document.getElementById('cards').innerHTML=indexes.map(item=>{
      const z=zoneUI[item.zone];
      const returns=periods.map(([label,key])=>{const v=item.r[key]; return `<div class="ret-item"><div class="label">${label}</div><div class="${v>=0?'up':'down'}">${v>0?'+':''}${v.toFixed(2)}%</div></div>`;}).join('');
      const pef = `<span class="hover" title="PE含TTM与FWD；TTM=过去12月市盈率，FWD=未来12月预期市盈率">PE</span>`;
      return `<article class="card" style="border-left-color:${z.border}"><div class="top"><div><div class="market">${item.market}</div><div class="name">${item.name}</div><div class="symbol">${item.symbol}</div></div><span class="badge" style="background:${z.bg};color:${z.text}">${z.label}</span></div><div class="price-box"><div class="label">实时估值价格</div><div class="price">${item.currency}${item.price.toLocaleString('zh-CN')}</div></div><div class="kpi-grid"><div class="kpi pe"><div class="label">${pef}</div><strong>${fmt(item.peTtm)}/${fmt(item.peFwd)}</strong></div><div class="kpi pb"><div class="label"><span class="hover" title="每股净资产倍数">PB</span></div><strong>${item.pb.toFixed(2)}</strong></div><div class="kpi peg"><div class="label"><span class="hover" title="市盈率相对增速">PEG</span></div><strong>${item.peg.toFixed(2)}</strong></div></div><div class="ret-grid">${returns}</div><div class="pct-grid"><div class="pct"><div>3年PE分位</div><strong>${item.p3}%</strong></div><div class="pct"><div>5年PE分位</div><strong>${item.p5}%</strong></div><div class="pct focus"><div>10年PE分位</div><strong>${item.p10}%</strong></div></div><div class="pechg-grid"><div class="pechg"><div>PE近3月变化</div><strong class="${item.peChg.m3>=0?'up':'down'}">${item.peChg.m3>0?'+':''}${item.peChg.m3.toFixed(2)}%</strong></div><div class="pechg"><div>PE近6月变化</div><strong class="${item.peChg.m6>=0?'up':'down'}">${item.peChg.m6>0?'+':''}${item.peChg.m6.toFixed(2)}%</strong></div><div class="pechg"><div>PE近1年变化</div><strong class="${item.peChg.y1>=0?'up':'down'}">${item.peChg.y1>0?'+':''}${item.peChg.y1.toFixed(2)}%</strong></div></div></article>`;
    }).join('');
  </script>
</body>
</html>
